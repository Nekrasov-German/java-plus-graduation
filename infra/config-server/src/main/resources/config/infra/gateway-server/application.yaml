spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user_service_route
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**

        - id: comment_service_route
          uri: lb://comment-service
          predicates:
            - Path=/admin/comments/**, /users/{userId}/events/{eventId}/comments/**, /events/{eventId}/comments/**

        - id: request_service_route
          uri: lb://request-service
          predicates:
            - Path=/users/{userId}/requests/**, /users/{userId}/events/{eventId}/requests**

        - id: event_service_route
          uri: lb://event-service
          predicates:
            - Path=/admin/categories/**, /admin/compilations/**, /admin/events/**, /users/{userId}/events/**

        - id: categories_event_service_route
          uri: lb://event-service
          predicates:
            - Path=/categories/**

        - id: events_event_service_route
          uri: lb://event-service
          predicates:
            - Path=/events/**

        - id: compilations_event_service_route
          uri: lb://event-service
          predicates:
            - Path=/compilations/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG
    reactor.netty.http.server: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway, refresh  # явно включите нужные эндпоинты
  endpoint:
    gateway:
      enabled: true
      show-details: always
    refresh:
      enabled: true